    <section class="admin-section">
      <h2>Add Team</h2>

      <form id="teamForm">
        <input name="team_name" placeholder="Team Name" required>
        <input name="coach_name" placeholder="Coach" required>
        <input name="contact" placeholder="Contact" required>
        <button type="submit">Add Team</button>

      <h2>Teams</h2>
